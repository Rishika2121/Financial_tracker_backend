services:
  - type: web
    name: expense-tax-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        scope: run
      - key: DATABASE_URL
        scope: run
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
